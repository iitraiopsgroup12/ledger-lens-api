openapi: 3.1.0
info:
  description: Financial Document Q&A Assistant API
  title: LedgerLens.ai Platform API
  version: 1.0.0
servers:
- url: /api/v1
security:
- bearerAuth: []
tags:
- name: Auth
- name: Companies
- name: Watchlist
- name: Documents
- name: MCP
- name: RAG
- name: Chat
- name: Compare
- name: Analyst Reports
- name: Dashboard
- name: Scheduler
paths:
  /auth/login:
    post:
      description: Authenticate a user and receive a JWT access token.
      operationId: authLogin
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/LoginSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security: []
      summary: Authenticate user
      tags:
      - Auth
  /auth/profile:
    get:
      description: Fetch the authenticated user's profile.
      operationId: getProfile
      responses:
        "200":
          $ref: "#/components/responses/ProfileSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get authenticated user profile
      tags:
      - Auth
  /companies/search:
    get:
      description: Search for a company by its NSE ticker symbol.
      operationId: searchCompany
      parameters:
      - $ref: "#/components/parameters/SearchSymbolQuery"
      responses:
        "200":
          $ref: "#/components/responses/CompanySearchSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Search company by symbol
      tags:
      - Companies
  /companies/{symbol}:
    get:
      description: Get full company profile including document count.
      operationId: getCompany
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/CompanyDetailsSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get company profile
      tags:
      - Companies
  /watchlist:
    get:
      description: Get all watchlist entries for the authenticated user.
      operationId: getWatchlist
      responses:
        "200":
          $ref: "#/components/responses/WatchlistListSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get watchlist
      tags:
      - Watchlist
    post:
      description: Add a company to the authenticated user's watchlist with a refresh
        frequency.
      operationId: createWatchlist
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistRequest"
        required: true
      responses:
        "201":
          $ref: "#/components/responses/WatchlistCreateSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Add company to watchlist
      tags:
      - Watchlist
  /watchlist/{symbol}:
    delete:
      description: Remove a company from the authenticated user's watchlist.
      operationId: deleteWatchlist
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/WatchlistDeleteSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Remove company from watchlist
      tags:
      - Watchlist
    put:
      description: Update the refresh frequency for a watchlisted company.
      operationId: updateWatchlist
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistUpdateRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/WatchlistUpdateSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Update watchlist frequency
      tags:
      - Watchlist
  /companies/{symbol}/documents:
    get:
      description: List all documents available for a company.
      operationId: listDocuments
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/DocumentListSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: List company documents
      tags:
      - Documents
  /documents/{document_id}:
    get:
      description: Retrieve document metadata and processing information.
      operationId: getDocument
      parameters:
      - $ref: "#/components/parameters/DocumentIdParam"
      responses:
        "200":
          $ref: "#/components/responses/DocumentSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get document metadata
      tags:
      - Documents
  /documents/{document_id}/download:
    get:
      description: Generate a pre-signed URL to download the document.
      operationId: downloadDocument
      parameters:
      - $ref: "#/components/parameters/DocumentIdParam"
      responses:
        "200":
          $ref: "#/components/responses/DownloadDocumentSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Download document
      tags:
      - Documents
  /mcp/{symbol}/announcements:
    get:
      description: Fetch latest NSE/BSE corporate announcements for a company.
      operationId: getAnnouncements
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/MCPAnnouncementsSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get corporate announcements
      tags:
      - MCP
  /mcp/{symbol}/refresh:
    post:
      description: Trigger manual MCP refresh for announcements and documents.
      operationId: refreshCompany
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/MCPRefreshSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Refresh company data
      tags:
      - MCP
  /rag/process/{document_id}:
    post:
      description: "Trigger extraction, chunking, embedding generation, and vector\
        \ indexing."
      operationId: processDocument
      parameters:
      - $ref: "#/components/parameters/DocumentIdParam"
      responses:
        "200":
          $ref: "#/components/responses/RAGProcessSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Process document for RAG
      tags:
      - RAG
  /rag/status/{document_id}:
    get:
      description: Retrieve current processing status of a document.
      operationId: getProcessingStatus
      parameters:
      - $ref: "#/components/parameters/DocumentIdParam"
      responses:
        "200":
          $ref: "#/components/responses/RAGStatusSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get RAG processing status
      tags:
      - RAG
  /chat:
    post:
      description: Ask a financial question using the RAG system.
      operationId: chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/ChatSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Submit chat query
      tags:
      - Chat
  /chat/history:
    get:
      description: Retrieve previous chat interactions for the authenticated user.
      operationId: getChatHistory
      responses:
        "200":
          $ref: "#/components/responses/ChatHistorySuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get chat history
      tags:
      - Chat
  /compare:
    post:
      description: "Compare two or more companies using annual reports, filings, and\
        \ extracted financial insights."
      operationId: compareCompanies
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
        required: true
      responses:
        "200":
          $ref: "#/components/responses/CompareSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Compare companies
      tags:
      - Compare
  /analyst-reports:
    post:
      description: Upload a broker analyst report PDF for processing.
      operationId: uploadAnalystReport
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/uploadAnalystReport_request"
        required: true
      responses:
        "201":
          $ref: "#/components/responses/AnalystReportUploadSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Upload analyst report
      tags:
      - Analyst Reports
  /companies/{symbol}/analyst-reports:
    get:
      description: Retrieve analyst reports for a company.
      operationId: getAnalystReports
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/AnalystReportsSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get analyst reports
      tags:
      - Analyst Reports
  /companies/{symbol}/sentiment:
    get:
      description: Retrieve aggregated analyst sentiment for a company.
      operationId: getCompanySentiment
      parameters:
      - $ref: "#/components/parameters/SymbolParam"
      responses:
        "200":
          $ref: "#/components/responses/CompanySentimentSuccess"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get company sentiment
      tags:
      - Analyst Reports
  /dashboard:
    get:
      description: "Retrieve dashboard metrics, watchlist statistics, processing status,\
        \ and recent updates."
      operationId: getDashboard
      responses:
        "200":
          $ref: "#/components/responses/DashboardSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get dashboard summary
      tags:
      - Dashboard
  /scheduler/run:
    post:
      description: Trigger scheduler execution manually.
      operationId: runScheduler
      responses:
        "200":
          $ref: "#/components/responses/SchedulerRunSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Run scheduler manually
      tags:
      - Scheduler
  /scheduler/status:
    get:
      description: Retrieve current scheduler execution status.
      operationId: getSchedulerStatus
      responses:
        "200":
          $ref: "#/components/responses/SchedulerStatusSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"
      summary: Get scheduler status
      tags:
      - Scheduler
components:
  parameters:
    SymbolParam:
      description: NSE ticker symbol
      example: TCS
      explode: false
      in: path
      name: symbol
      required: true
      schema:
        type: string
      style: simple
    SearchSymbolQuery:
      description: NSE ticker symbol
      example: TCS
      explode: true
      in: query
      name: symbol
      required: true
      schema:
        type: string
      style: form
    DocumentIdParam:
      description: Document identifier
      explode: false
      in: path
      name: document_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Bad Request
    LoginSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LoginResponse"
      description: Login successful
    ProfileSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProfileResponse"
      description: User profile retrieved successfully
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unauthorized
    InternalServerError:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Internal Server Error
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Resource Not Found
    Conflict:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Conflict
    DocumentSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentDetails"
      description: Document metadata retrieved successfully
    DocumentListSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DocumentListResponse"
      description: Documents retrieved successfully
    DownloadDocumentSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DownloadDocumentResponse"
      description: Download URL generated successfully
    UnprocessableEntity:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Unprocessable Entity
    ChatSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ChatResponse"
      description: Chat response generated successfully
    ChatHistorySuccess:
      content:
        application/json:
          schema:
            items:
              $ref: "#/components/schemas/ChatHistoryItem"
            type: array
      description: Chat history retrieved successfully
    CompareSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CompareResponse"
      description: Company comparison generated successfully
    AnalystReportUploadSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AnalystReportUploadResponse"
      description: Analyst report uploaded successfully
    AnalystReportsSuccess:
      content:
        application/json:
          schema:
            items:
              $ref: "#/components/schemas/AnalystReport"
            type: array
      description: Analyst reports retrieved successfully
    CompanySentimentSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CompanySentiment"
      description: Company sentiment retrieved successfully
    CompanySearchSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Company"
      description: Company found successfully
    CompanyDetailsSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CompanyDetails"
      description: Company details retrieved successfully
    DashboardSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DashboardResponse"
      description: Dashboard data retrieved successfully
    SchedulerRunSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SchedulerRunResponse"
      description: Scheduler executed successfully
    SchedulerStatusSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SchedulerStatus"
      description: Scheduler status retrieved successfully
    WatchlistCreateSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Watchlist"
      description: Watchlist created successfully
    WatchlistListSuccess:
      content:
        application/json:
          schema:
            items:
              $ref: "#/components/schemas/WatchlistItem"
            type: array
      description: Watchlist retrieved successfully
    WatchlistUpdateSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/inline_object"
      description: Watchlist updated successfully
    WatchlistDeleteSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/WatchlistDeleteResponse"
      description: Watchlist removed successfully
    MCPAnnouncementsSuccess:
      content:
        application/json:
          schema:
            items:
              $ref: "#/components/schemas/MCPAnnouncement"
            type: array
      description: Corporate announcements retrieved successfully
    MCPRefreshSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RefreshResponse"
      description: Company refresh completed successfully
    RAGProcessSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RAGProcessResponse"
      description: RAG processing started successfully
    RAGStatusSuccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RAGStatusResponse"
      description: RAG processing status retrieved successfully
    Forbidden:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
      description: Forbidden
  schemas:
    LoginRequest:
      example:
        password: password
        email: email
      properties:
        email:
          format: email
          title: email
          type: string
        password:
          title: password
          type: string
      required:
      - email
      - password
      title: LoginRequest
    LoginUser:
      example:
        name: name
        id: id
      properties:
        id:
          title: id
          type: string
        name:
          title: name
          type: string
      title: LoginUser
    LoginResponse:
      example:
        access_token: access_token
        user:
          name: name
          id: id
      properties:
        access_token:
          title: access_token
          type: string
        user:
          $ref: "#/components/schemas/LoginUser"
      title: LoginResponse
    ProfileResponse:
      example:
        role: role
        id: id
        email: email
      properties:
        id:
          title: id
          type: string
        email:
          title: email
          type: string
        role:
          title: role
          type: string
      title: ProfileResponse
    ErrorResponse:
      example:
        detail: detail
      properties:
        detail:
          title: detail
          type: string
      title: ErrorResponse
    Company:
      example:
        symbol: symbol
        company_name: company_name
        sector: sector
      properties:
        symbol:
          title: symbol
          type: string
        company_name:
          title: company_name
          type: string
        sector:
          title: sector
          type: string
      required:
      - company_name
      - symbol
      title: Company
    CompanyDetails:
      example:
        symbol: symbol
        is_active: true
        documents: 0
        name: name
        sector: sector
      properties:
        symbol:
          title: symbol
          type: string
        name:
          title: name
          type: string
        sector:
          title: sector
          type: string
        documents:
          title: documents
          type: integer
        is_active:
          title: is_active
          type: boolean
      required:
      - name
      - symbol
      title: CompanyDetails
    WatchlistRequest:
      example:
        symbol: symbol
        frequency: daily
      properties:
        symbol:
          title: symbol
          type: string
        frequency:
          enum:
          - daily
          - weekly
          title: frequency
          type: string
      required:
      - frequency
      - symbol
      title: WatchlistRequest
    WatchlistUpdateRequest:
      example:
        frequency: daily
      properties:
        frequency:
          enum:
          - daily
          - weekly
          title: frequency
          type: string
      required:
      - frequency
      title: WatchlistUpdateRequest
    Watchlist:
      example:
        symbol: symbol
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        frequency: daily
        status: active
      properties:
        id:
          format: uuid
          title: id
          type: string
        symbol:
          title: symbol
          type: string
        frequency:
          enum:
          - daily
          - weekly
          title: frequency
          type: string
        status:
          enum:
          - active
          - paused
          title: status
          type: string
      required:
      - frequency
      - id
      - status
      - symbol
      title: Watchlist
    WatchlistItem:
      example:
        symbol: symbol
        company_name: company_name
        last_update: 2000-01-23T04:56:07.000+00:00
        frequency: frequency
        status: status
      properties:
        symbol:
          title: symbol
          type: string
        company_name:
          title: company_name
          type: string
        frequency:
          title: frequency
          type: string
        last_update:
          format: date-time
          title: last_update
          type: string
        status:
          title: status
          type: string
      title: WatchlistItem
    WatchlistDeleteResponse:
      example:
        message: message
      properties:
        message:
          title: message
          type: string
      title: WatchlistDeleteResponse
    Document:
      example:
        report_year: report_year
        processing_status: pending
        document_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        title: title
        type: annual_report
        upload_date: 2000-01-23
      properties:
        document_id:
          format: uuid
          title: document_id
          type: string
        title:
          title: title
          type: string
        type:
          enum:
          - annual_report
          - announcement
          - other
          title: type
          type: string
        report_year:
          title: report_year
          type: string
        processing_status:
          enum:
          - pending
          - processing
          - completed
          - failed
          title: processing_status
          type: string
        upload_date:
          format: date
          title: upload_date
          type: string
      title: Document
    DocumentDetails:
      example:
        company_symbol: company_symbol
        s3_key: s3_key
        processing_status: pending
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        title: title
        type: type
      properties:
        id:
          format: uuid
          title: id
          type: string
        company_symbol:
          title: company_symbol
          type: string
        title:
          title: title
          type: string
        type:
          title: type
          type: string
        s3_key:
          title: s3_key
          type: string
        processing_status:
          enum:
          - pending
          - processing
          - completed
          - failed
          title: processing_status
          type: string
      title: DocumentDetails
    DownloadDocumentResponse:
      example:
        expires_in: 0
        url: https://openapi-generator.tech
      properties:
        url:
          format: uri
          title: url
          type: string
        expires_in:
          title: expires_in
          type: integer
      title: DownloadDocumentResponse
    DocumentListResponse:
      items:
        $ref: "#/components/schemas/Document"
      type: array
    MCPAnnouncement:
      example:
        date: 2000-01-23
        pdf_url: https://openapi-generator.tech
        title: title
      properties:
        title:
          title: title
          type: string
        pdf_url:
          format: uri
          title: pdf_url
          type: string
        date:
          format: date
          title: date
          type: string
      required:
      - date
      - pdf_url
      - title
      title: MCPAnnouncement
    RefreshResponse:
      example:
        new_documents_found: 0
        document_ids:
        - document_ids
        - document_ids
        status: status
      properties:
        status:
          title: status
          type: string
        new_documents_found:
          title: new_documents_found
          type: integer
        document_ids:
          items:
            type: string
          title: document_ids
          type: array
      required:
      - status
      title: RefreshResponse
    RAGProcessResponse:
      example:
        document_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        message: message
        status: pending
      properties:
